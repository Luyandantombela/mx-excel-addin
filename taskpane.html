<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MX Sheet Toolkit</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111318;--s1:#1a1d24;--s2:#21242d;--s3:#272b35;
  --b1:#2e3240;--b2:#3a3f52;
  --acc:#4f8ef7;--acc2:#2563d4;--acc-bg:#0e1e3d;
  --red:#f26c6c;--red-bg:#2a0d0d;--red-b:#5c1c1c;
  --amber:#f5a623;--amber-bg:#2a1c00;
  --green:#52c97a;--green-bg:#0a2416;
  --t1:#f0ede8;--t2:#c8c4bc;--t3:#7a7f90;--t4:#4a4f60;
  --mono:'IBM Plex Mono',monospace;
}
html,body{height:100%;background:var(--bg);font-family:'IBM Plex Sans',sans-serif;color:var(--t1)}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── Home screen ── */
#home{display:flex;flex-direction:column;height:100%;padding:14px;gap:12px;overflow-y:auto}
.header h1{font-size:15px;font-weight:600;letter-spacing:.02em}
.header p{font-size:11.5px;color:var(--t3);margin-top:3px}

.sel-box{background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:10px 12px;font-family:var(--mono);font-size:11px;color:var(--t2)}
.sel-label{color:var(--t3);font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.sel-addr{color:var(--acc);font-weight:600}
.sel-count{color:var(--t3);margin-top:2px}
#refresh-btn{margin-top:8px;font-size:11px;font-weight:600;color:var(--t2);background:var(--s2);border:1px solid var(--b1);border-radius:6px;padding:6px 10px;cursor:pointer;display:flex;align-items:center;gap:6px;width:fit-content}
#refresh-btn:hover{background:var(--s3);border-color:var(--b2);color:var(--t1)}

.feature-list{display:flex;flex-direction:column;gap:8px}
.feature-btn{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--s1);border:1px solid var(--b1);border-radius:8px;cursor:pointer;transition:all .12s;text-align:left;color:var(--t1);font-family:'IBM Plex Sans',sans-serif;width:100%}
.feature-btn:hover{background:var(--s2);border-color:var(--b2)}
.feature-btn.active{background:var(--acc-bg);border-color:var(--acc)}
.feature-btn i{font-size:18px;color:var(--acc);flex-shrink:0;width:22px;text-align:center}
.ft-text{display:flex;flex-direction:column;gap:1px}
.ft-title{font-size:12.5px;font-weight:600}
.ft-desc{font-size:10.5px;color:var(--t3)}

/* ── Clean panel ── */
#clean-panel{display:none;flex-direction:column;height:100%}
.cp-header{display:flex;align-items:center;gap:10px;padding:14px 14px 10px;border-bottom:1px solid var(--b1);flex-shrink:0}
.cp-back{background:none;border:none;color:var(--t3);cursor:pointer;font-size:18px;display:flex;align-items:center;padding:2px}
.cp-back:hover{color:var(--t1)}
.cp-title{font-size:14px;font-weight:600}
.cp-sub{font-size:11px;color:var(--t3);margin-top:1px}

.cp-body{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px}

/* accordion sections */
.acc-section{background:var(--s1);border:1px solid var(--b1);border-radius:8px;overflow:hidden}
.acc-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;transition:background .1s}
.acc-header:hover{background:var(--s2)}
.acc-icon{font-size:16px;flex-shrink:0}
.acc-label{flex:1;font-size:12.5px;font-weight:600}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:12px;font-family:var(--mono)}
.badge-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b)}
.badge-blue{background:var(--acc-bg);color:var(--acc);border:1px solid #1e3a6e}
.badge-amber{background:var(--amber-bg);color:var(--amber);border:1px solid #4a3000}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid #1a4a2e}
.acc-chevron{font-size:14px;color:var(--t4);transition:transform .2s}
.acc-chevron.open{transform:rotate(180deg)}

.acc-body{display:none;border-top:1px solid var(--b1);padding:0}
.acc-body.open{display:block}

/* row list inside accordion */
.row-list{max-height:180px;overflow-y:auto}
.row-item{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--b1);font-size:11.5px;font-family:var(--mono)}
.row-item:last-child{border-bottom:none}
.row-item input[type=checkbox]{accent-color:var(--acc);width:14px;height:14px;flex-shrink:0;cursor:pointer}
.row-num{color:var(--t4);font-size:10px;min-width:28px}
.row-preview{color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.row-tag{font-size:9.5px;padding:1px 6px;border-radius:4px;flex-shrink:0}

.select-all-row{display:flex;align-items:center;gap:8px;padding:8px 14px;font-size:11px;color:var(--t3);border-bottom:1px solid var(--b1);cursor:pointer}
.select-all-row input{accent-color:var(--acc);cursor:pointer}

/* empty state */
.acc-empty{padding:12px 14px;font-size:11.5px;color:var(--t4);font-style:italic}

/* scanning state */
.scanning{display:flex;align-items:center;gap:8px;padding:14px;font-size:12px;color:var(--t3)}
.spin{animation:spin .8s linear infinite;display:inline-block;font-size:16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* footer */
.cp-footer{padding:12px 14px;border-top:1px solid var(--b1);flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.apply-btn{width:100%;padding:11px;font-size:13px;font-weight:700;background:var(--acc);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:'IBM Plex Sans',sans-serif;letter-spacing:.02em;transition:background .15s}
.apply-btn:hover{background:var(--acc2)}
.apply-btn:disabled{background:var(--b1);color:var(--t4);cursor:not-allowed}
.apply-note{font-size:10.5px;color:var(--t4);text-align:center}

/* toast */
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--green-bg);border:1px solid var(--green);color:var(--green);padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;display:none;z-index:999;white-space:nowrap}
#toast.err{background:var(--red-bg);border-color:var(--red);color:var(--red)}
</style>
</head>
<body>
<div id="app">

  <!-- ── HOME ── -->
  <div id="home">
    <div class="header">
      <h1>MX Sheet Toolkit</h1>
      <p>Select cells in your sheet, then pick a feature.</p>
    </div>

    <div class="sel-box">
      <div class="sel-label">Current Selection</div>
      <div class="sel-addr" id="sel-addr">—</div>
      <div class="sel-count" id="sel-count">No selection yet</div>
      <button id="refresh-btn"><i class="ti ti-refresh"></i>Refresh selection</button>
    </div>

    <div class="feature-list">
      <button class="feature-btn" data-feature="clean">
        <i class="ti ti-sparkles"></i>
        <div class="ft-text"><span class="ft-title">Clean a sheet</span><span class="ft-desc">Remove blanks, duplicates, fix formatting</span></div>
      </button>
      <button class="feature-btn" data-feature="search-row">
        <i class="ti ti-list-search"></i>
        <div class="ft-text"><span class="ft-title">Search for a row</span><span class="ft-desc">Find rows matching a value or condition</span></div>
      </button>
      <button class="feature-btn" data-feature="bulk">
        <i class="ti ti-stack-2"></i>
        <div class="ft-text"><span class="ft-title">Bulk manipulation</span><span class="ft-desc">Apply changes across many rows at once</span></div>
      </button>
      <button class="feature-btn" data-feature="edit-column">
        <i class="ti ti-edit"></i>
        <div class="ft-text"><span class="ft-title">Edit column</span><span class="ft-desc">Transform or update a whole column</span></div>
      </button>
      <button class="feature-btn" data-feature="compare">
        <i class="ti ti-layers-difference"></i>
        <div class="ft-text"><span class="ft-title">Compare sheets</span><span class="ft-desc">Diff two sheets or ranges</span></div>
      </button>
      <button class="feature-btn" data-feature="add-sheet">
        <i class="ti ti-file-plus"></i>
        <div class="ft-text"><span class="ft-title">Add a sheet</span><span class="ft-desc">Create a new sheet in this workbook</span></div>
      </button>
      <button class="feature-btn" data-feature="search-sheet">
        <i class="ti ti-folder-search"></i>
        <div class="ft-text"><span class="ft-title">Search for a sheet</span><span class="ft-desc">Find and jump to a sheet by name</span></div>
      </button>
    </div>
  </div>

  <!-- ── CLEAN PANEL ── -->
  <div id="clean-panel">
    <div class="cp-header">
      <button class="cp-back" id="clean-back"><i class="ti ti-arrow-left"></i></button>
      <div>
        <div class="cp-title">Clean a sheet</div>
        <div class="cp-sub" id="clean-sub">Analysing selection…</div>
      </div>
    </div>

    <div class="cp-body" id="clean-body">
      <div class="scanning"><i class="ti ti-loader-2 spin"></i> Scanning your data…</div>
    </div>

    <div class="cp-footer">
      <button class="apply-btn" id="apply-btn" disabled>Apply &amp; create cleaned sheet</button>
      <div class="apply-note">A new sheet will be created with the cleaned data. Your original sheet stays untouched.</div>
    </div>
  </div>

</div>
<div id="toast"></div>

<script>
/* ── state ── */
let currentSelection = null;
let cleanResults = null; // { blanks:[], duplicates:[], formatting:[], emails:[] }

/* ── Office ready ── */
Office.onReady(() => {
  document.getElementById('refresh-btn').addEventListener('click', readSelection);
  document.getElementById('clean-back').addEventListener('click', showHome);
  document.getElementById('apply-btn').addEventListener('click', applyClean);
  document.querySelectorAll('.feature-btn').forEach(btn => {
    btn.addEventListener('click', () => handleFeature(btn.dataset.feature));
  });
  readSelection();
});

/* ── read selection ── */
async function readSelection() {
  try {
    await Excel.run(async (ctx) => {
      const range = ctx.workbook.getSelectedRange();
      range.load(['address','values','rowCount','columnCount']);
      await ctx.sync();
      currentSelection = { address: range.address, values: range.values, rowCount: range.rowCount, columnCount: range.columnCount };
      document.getElementById('sel-addr').textContent = range.address;
      document.getElementById('sel-count').textContent = `${range.rowCount} row(s) × ${range.columnCount} col(s)`;
    });
  } catch(e) {
    document.getElementById('sel-addr').textContent = 'Error';
    document.getElementById('sel-count').textContent = e.message;
  }
}

/* ── feature router ── */
function handleFeature(feature) {
  if (feature === 'clean') openClean();
  else showToast(`"${feature}" feature coming soon!`, false);
}

/* ── show/hide screens ── */
function showHome() {
  document.getElementById('home').style.display = 'flex';
  document.getElementById('clean-panel').style.display = 'none';
}
function showClean() {
  document.getElementById('home').style.display = 'none';
  document.getElementById('clean-panel').style.display = 'flex';
}

/* ── CLEAN FEATURE ── */
function openClean() {
  if (!currentSelection || !currentSelection.values || currentSelection.values.length < 2) {
    showToast('Please select data with at least a header row and one data row.', true);
    return;
  }
  showClean();
  analyseData();
}

function analyseData() {
  const body = document.getElementById('clean-body');
  body.innerHTML = '<div class="scanning"><i class="ti ti-loader-2 spin"></i> Scanning your data…</div>';
  document.getElementById('apply-btn').disabled = true;
  document.getElementById('clean-sub').textContent = 'Analysing selection…';

  // slight delay so the spinner shows
  setTimeout(() => {
    const values = currentSelection.values;
    const headers = values[0];
    const dataRows = values.slice(1);

    // 1. BLANKS — rows where every cell is empty
    const blanks = [];
    dataRows.forEach((row, i) => {
      if (row.every(c => c === null || c === '' || c === undefined)) {
        blanks.push({ rowIndex: i + 2, preview: '(empty row)' });
      }
    });

    // 2. DUPLICATES — rows with identical content
    const seen = {};
    const duplicates = [];
    dataRows.forEach((row, i) => {
      const key = JSON.stringify(row);
      if (seen[key] !== undefined) {
        duplicates.push({ rowIndex: i + 2, preview: row.filter(c => c !== '' && c !== null).slice(0, 3).join(' · '), firstAt: seen[key] + 2 });
      } else {
        seen[key] = i;
      }
    });

    // 3. FORMATTING INCONSISTENCIES — cells with extra whitespace or mixed case
    const formatting = [];
    dataRows.forEach((row, i) => {
      row.forEach((cell, j) => {
        if (typeof cell === 'string' && cell !== cell.trim()) {
          formatting.push({ rowIndex: i + 2, col: headers[j] || `Col ${j+1}`, preview: `"${cell}" → "${cell.trim()}"` });
        }
      });
    });

    // 4. INCORRECT EMAILS — basic email validation
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const emails = [];
    headers.forEach((h, j) => {
      if (typeof h === 'string' && h.toLowerCase().includes('email')) {
        dataRows.forEach((row, i) => {
          const val = row[j];
          if (val && typeof val === 'string' && !emailRe.test(val.trim())) {
            emails.push({ rowIndex: i + 2, col: h, value: val });
          }
        });
      }
    });

    cleanResults = { blanks, duplicates, formatting, emails };

    const total = blanks.length + duplicates.length + formatting.length + emails.length;
    document.getElementById('clean-sub').textContent =
      total === 0 ? 'No issues found' : `${total} issue${total !== 1 ? 's' : ''} found`;

    renderCleanPanel();
    document.getElementById('apply-btn').disabled = false;
  }, 400);
}

function renderCleanPanel() {
  const { blanks, duplicates, formatting, emails } = cleanResults;
  const body = document.getElementById('clean-body');
  body.innerHTML = '';

  body.appendChild(makeSection({
    id: 'sec-blanks',
    icon: 'ti-circle-minus',
    iconColor: 'var(--red)',
    label: 'Blank rows',
    badge: blanks.length,
    badgeClass: 'badge-red',
    items: blanks,
    renderItem: (item) => `<span class="row-num">Row ${item.rowIndex}</span><span class="row-preview">${item.preview}</span>`,
    emptyText: 'No blank rows found'
  }));

  body.appendChild(makeSection({
    id: 'sec-dupes',
    icon: 'ti-copy',
    iconColor: 'var(--amber)',
    label: 'Duplicate rows',
    badge: duplicates.length,
    badgeClass: 'badge-amber',
    items: duplicates,
    renderItem: (item) => `<span class="row-num">Row ${item.rowIndex}</span><span class="row-preview">${item.preview}</span><span class="row-tag badge badge-amber">dupe of ${item.firstAt}</span>`,
    emptyText: 'No duplicate rows found'
  }));

  body.appendChild(makeSection({
    id: 'sec-fmt',
    icon: 'ti-text-spellcheck',
    iconColor: 'var(--acc)',
    label: 'Formatting inconsistencies',
    badge: formatting.length,
    badgeClass: 'badge-blue',
    items: formatting,
    renderItem: (item) => `<span class="row-num">Row ${item.rowIndex}</span><span class="row-preview">[${item.col}] ${item.preview}</span>`,
    emptyText: 'No whitespace issues found'
  }));

  body.appendChild(makeSection({
    id: 'sec-email',
    icon: 'ti-mail-x',
    iconColor: 'var(--amber)',
    label: 'Incorrect emails',
    badge: emails.length,
    badgeClass: 'badge-amber',
    items: emails,
    renderItem: (item) => `<span class="row-num">Row ${item.rowIndex}</span><span class="row-preview">[${item.col}] ${item.value}</span>`,
    emptyText: 'No email issues found'
  }));
}

function makeSection({ id, icon, iconColor, label, badge, badgeClass, items, renderItem, emptyText }) {
  const sec = document.createElement('div');
  sec.className = 'acc-section';
  sec.id = id;

  const hdr = document.createElement('div');
  hdr.className = 'acc-header';
  hdr.innerHTML = `
    <i class="ti ${icon} acc-icon" style="color:${iconColor}"></i>
    <span class="acc-label">${label}</span>
    <span class="badge ${badgeClass}">${badge}</span>
    <i class="ti ti-chevron-down acc-chevron" id="${id}-chev"></i>
  `;
  hdr.addEventListener('click', () => toggleSection(id));

  const bdy = document.createElement('div');
  bdy.className = 'acc-body';
  bdy.id = `${id}-body`;

  if (items.length === 0) {
    bdy.innerHTML = `<div class="acc-empty">${emptyText}</div>`;
  } else {
    // select-all row
    const selAll = document.createElement('label');
    selAll.className = 'select-all-row';
    selAll.innerHTML = `<input type="checkbox" checked id="${id}-all"> Select all (${items.length})`;
    selAll.querySelector('input').addEventListener('change', (e) => {
      bdy.querySelectorAll('.row-cb').forEach(cb => cb.checked = e.target.checked);
    });
    bdy.appendChild(selAll);

    const list = document.createElement('div');
    list.className = 'row-list';
    items.forEach((item, idx) => {
      const row = document.createElement('div');
      row.className = 'row-item';
      row.innerHTML = `<input type="checkbox" class="row-cb" data-section="${id}" data-idx="${idx}" checked>${renderItem(item)}`;
      list.appendChild(row);
    });
    bdy.appendChild(list);
  }

  sec.appendChild(hdr);
  sec.appendChild(bdy);
  return sec;
}

function toggleSection(id) {
  const bdy = document.getElementById(`${id}-body`);
  const chev = document.getElementById(`${id}-chev`);
  bdy.classList.toggle('open');
  chev.classList.toggle('open');
}

/* ── APPLY ── */
async function applyClean() {
  const btn = document.getElementById('apply-btn');
  btn.disabled = true;
  btn.textContent = 'Creating cleaned sheet…';

  try {
    // figure out which rows to REMOVE
    const rowsToRemove = new Set();

    // blanks
    document.querySelectorAll('#sec-blanks .row-cb:checked').forEach((cb) => {
      const idx = parseInt(cb.dataset.idx);
      rowsToRemove.add(cleanResults.blanks[idx].rowIndex - 2); // 0-based data index
    });
    // duplicates
    document.querySelectorAll('#sec-dupes .row-cb:checked').forEach((cb) => {
      const idx = parseInt(cb.dataset.idx);
      rowsToRemove.add(cleanResults.duplicates[idx].rowIndex - 2);
    });

    // rows to fix (formatting)
    const formattingFixes = new Set();
    document.querySelectorAll('#sec-fmt .row-cb:checked').forEach((cb) => {
      formattingFixes.add(parseInt(cb.dataset.idx));
    });

    const original = currentSelection.values;
    const headers = original[0];
    let dataRows = original.slice(1);

    // apply formatting fixes
    formattingFixes.forEach(idx => {
      const item = cleanResults.formatting[idx];
      const colIdx = headers.indexOf(item.col);
      if (colIdx >= 0 && dataRows[item.rowIndex - 2]) {
        dataRows[item.rowIndex - 2][colIdx] = dataRows[item.rowIndex - 2][colIdx].trim();
      }
    });

    // filter out removed rows
    const cleanedData = [headers, ...dataRows.filter((_, i) => !rowsToRemove.has(i))];

    await Excel.run(async (ctx) => {
      const sheets = ctx.workbook.worksheets;
      sheets.load('items/name');
      await ctx.sync();

      // find unique sheet name
      const existing = sheets.items.map(s => s.name);
      let newName = 'Cleaned Data';
      let counter = 1;
      while (existing.includes(newName)) { newName = `Cleaned Data ${counter++}`; }

      const newSheet = sheets.add(newName);
      const targetRange = newSheet.getRangeByIndexes(0, 0, cleanedData.length, cleanedData[0].length);
      targetRange.values = cleanedData;

      // bold header row
      newSheet.getRangeByIndexes(0, 0, 1, cleanedData[0].length).format.font.bold = true;

      newSheet.activate();
      await ctx.sync();
    });

    showToast(`✓ Cleaned sheet created!`, false);
    showHome();
  } catch(e) {
    showToast(e.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Apply & create cleaned sheet';
  }
}

/* ── toast ── */
function showToast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = isErr ? 'err' : '';
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3500);
}
</script>
</body>
</html>
