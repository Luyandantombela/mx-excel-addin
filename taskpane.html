<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MX Sheet Toolkit</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111318;--s1:#1a1d24;--s2:#21242d;--s3:#272b35;
  --b1:#2e3240;--b2:#3a3f52;
  --acc:#4f8ef7;--acc2:#2563d4;--acc-bg:#0e1e3d;
  --red:#f26c6c;--red-bg:#2a0d0d;--red-b:#5c1c1c;
  --amber:#f5a623;--amber-bg:#2a1c00;--amber-b:#4a3000;
  --green:#52c97a;--green-bg:#0a2416;--green-b:#1a4a2e;
  --purple:#b06ef7;
  --t1:#f0ede8;--t2:#c8c4bc;--t3:#7a7f90;--t4:#4a4f60;
  --mono:'IBM Plex Mono',monospace;
}

html,body{
  height:100%;
  background:var(--bg);
  font-family:'IBM Plex Sans',sans-serif;
  color:var(--t1);
  overflow:hidden;
}

/* each screen fills the viewport and manages its own scroll */
.screen{
  display:none;
  flex-direction:column;
  height:100%;
  overflow:hidden;
  position:absolute;
  top:0;left:0;right:0;bottom:0;
}
.screen.active{ display:flex; }

/* sticky top header inside a screen */
.panel-header{
  flex-shrink:0;
  display:flex;align-items:center;gap:10px;
  padding:13px 14px 11px;
  border-bottom:1px solid var(--b1);
  background:var(--bg);
}
.back-btn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:18px;display:flex;align-items:center;padding:2px 4px;border-radius:4px}
.back-btn:hover{color:var(--t1);background:var(--s2)}
.panel-title{font-size:14px;font-weight:600}
.panel-sub{font-size:10.5px;color:var(--t3);margin-top:2px}

/* THE scrollable area — this is the ONLY thing that scrolls */
.panel-body{
  flex:1;
  overflow-y:auto;
  padding:12px 14px;
  display:flex;
  flex-direction:column;
  gap:10px;
  /* allow it to grow beyond viewport and scroll */
  min-height:0;
}
.panel-body::-webkit-scrollbar{width:4px}
.panel-body::-webkit-scrollbar-track{background:transparent}
.panel-body::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* sticky bottom footer */
.panel-footer{
  flex-shrink:0;
  padding:11px 14px;
  border-top:1px solid var(--b1);
  background:var(--bg);
  display:flex;flex-direction:column;gap:6px;
}
.primary-btn{
  width:100%;padding:11px;font-size:13px;font-weight:700;
  background:var(--acc);color:#fff;border:none;border-radius:8px;
  cursor:pointer;font-family:'IBM Plex Sans',sans-serif;transition:background .15s;
}
.primary-btn:hover{background:var(--acc2)}
.primary-btn:disabled{background:var(--b1);color:var(--t4);cursor:not-allowed}
.btn-note{font-size:10px;color:var(--t4);text-align:center}

/* ══ HOME ══ */
#home .panel-body{ padding:14px; gap:12px; }
.home-header h1{font-size:15px;font-weight:600}
.home-header p{font-size:11.5px;color:var(--t3);margin-top:3px}

.sel-box{background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:10px 12px;font-family:var(--mono);font-size:11px}
.sel-label{color:var(--t3);font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.sel-addr{color:var(--acc);font-weight:600}
.sel-count{color:var(--t3);margin-top:2px}
#refresh-btn{margin-top:8px;font-size:11px;font-weight:600;color:var(--t2);background:var(--s2);border:1px solid var(--b1);border-radius:6px;padding:6px 10px;cursor:pointer;display:flex;align-items:center;gap:6px;width:fit-content}
#refresh-btn:hover{background:var(--s3);border-color:var(--b2);color:var(--t1)}

.feature-list{display:flex;flex-direction:column;gap:8px}
.feature-btn{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--s1);border:1px solid var(--b1);border-radius:8px;cursor:pointer;transition:all .12s;text-align:left;color:var(--t1);font-family:'IBM Plex Sans',sans-serif;width:100%}
.feature-btn:hover{background:var(--s2);border-color:var(--b2)}
.feature-btn i{font-size:18px;color:var(--acc);flex-shrink:0;width:22px;text-align:center}
.ft-text{display:flex;flex-direction:column;gap:1px}
.ft-title{font-size:12.5px;font-weight:600}
.ft-desc{font-size:10.5px;color:var(--t3)}

/* ══ STEP 1 — COLUMN TYPES ══ */
.step-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t4)}
.col-type-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--s1);border:1px solid var(--b1);border-radius:8px}
.col-name{font-size:12px;font-weight:600;color:var(--t1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.col-sample{font-size:10px;color:var(--t4);font-family:var(--mono);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.type-select{background:var(--s2);border:1px solid var(--b1);border-radius:6px;color:var(--t1);font-size:11px;padding:5px 8px;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;outline:none;flex-shrink:0}
.type-select:focus{border-color:var(--acc)}
.tdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot-text{background:var(--purple)}.dot-number{background:var(--green)}.dot-email{background:var(--amber)}.dot-date{background:var(--acc)}

/* ══ ACCORDION — exact pattern from the original web app ══ */
.acc{
  background:var(--s1);
  border:1px solid var(--b1);
  border-radius:8px;
  overflow:hidden;
  transition:all .15s;
  flex-shrink:0;             /* critical: never let flexbox compress this */
}
.acc-hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none;transition:background .12s}
.acc-hdr:hover{background:var(--s2)}
.acc-hdr-icon{font-size:16px;flex-shrink:0}
.acc-hdr-label{flex:1;font-size:12.5px;font-weight:600}
.badge{font-size:10px;font-weight:700;padding:2px 9px;border-radius:12px;font-family:var(--mono);flex-shrink:0}
.b-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-b)}
.b-amber{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-b)}
.b-blue{background:var(--acc-bg);color:var(--acc);border:1px solid #1e3a6e}
.acc-chev{font-size:14px;color:var(--t4);transition:transform .2s;flex-shrink:0}
.acc-chev.open{transform:rotate(180deg)}

/* collapsed: max-height 0 + hidden overflow. expanded: max-height none + visible.
   This is the exact technique used in the original web app (max-height, not display). */
.acc-body{
  max-height:0;
  overflow:hidden;
  transition:max-height .25s cubic-bezier(.4,0,.2,1);
}
.acc-body.open{
  max-height:none;
  overflow-y:visible;
  border-top:1px solid var(--b1);
}
.acc-empty{padding:12px 14px;font-size:11.5px;color:var(--t4);font-style:italic}

/* ── blank cells ── */
.blank-col-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--b1)}
.blank-col-row:last-child{border-bottom:none}
.blank-col-name{font-size:12px;font-weight:600;color:var(--t1)}
.blank-col-meta{font-size:10px;color:var(--t3);margin-top:1px}
.blank-input{background:var(--s2);border:1px solid var(--b1);border-radius:6px;color:var(--t1);font-size:11px;padding:5px 9px;font-family:var(--mono);width:120px;flex-shrink:0;outline:none}
.blank-input:focus{border-color:var(--acc)}

/* ── duplicates ── */
.sel-all-row{display:flex;align-items:center;gap:8px;padding:8px 14px;font-size:11px;color:var(--t3);border-bottom:1px solid var(--b1);cursor:pointer}
.sel-all-row input{accent-color:var(--acc);cursor:pointer;width:14px;height:14px}
.dupe-row{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid var(--b1)}
.dupe-row:last-child{border-bottom:none}
.dupe-row input[type=checkbox]{accent-color:var(--acc);width:14px;height:14px;flex-shrink:0;cursor:pointer}
.dupe-rnum{font-size:10px;color:var(--t4);font-family:var(--mono);flex-shrink:0;min-width:48px}
.dupe-preview{font-size:11px;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:var(--mono)}
.dupe-tag{font-size:9.5px;padding:2px 7px;border-radius:4px;flex-shrink:0;background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-b)}

/* ── formatting ── */
.fmt-col-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--b1)}
.fmt-col-row:last-child{border-bottom:none}
.fmt-col-name{font-size:12px;font-weight:600;color:var(--t1)}
.fmt-col-type{font-size:10px;color:var(--t3);margin-top:1px}
.fmt-select{background:var(--s2);border:1px solid var(--b1);border-radius:6px;color:var(--t1);font-size:11px;padding:5px 8px;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;outline:none;flex-shrink:0}
.fmt-select:focus{border-color:var(--acc)}
.add-col-row{padding:10px 14px}
.add-col-btn{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--acc);background:none;border:none;cursor:pointer;padding:4px 0;font-family:'IBM Plex Sans',sans-serif}
.add-col-btn:hover{color:var(--t1)}

/* ── emails ── */
.email-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--b1)}
.email-row:last-child{border-bottom:none}
.email-rnum{font-size:10px;color:var(--t4);font-family:var(--mono);flex-shrink:0;min-width:48px}
.email-val{font-size:11px;color:var(--red);font-family:var(--mono);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.email-input{background:var(--s2);border:1px solid var(--b1);border-radius:6px;color:var(--t1);font-size:11px;padding:5px 9px;font-family:var(--mono);width:130px;flex-shrink:0;outline:none}
.email-input:focus{border-color:var(--acc)}

/* ══ inputs/selects — exact from original site ══ */
.p-inp,.p-sel{
  width:100%;background:var(--bg);border:1px solid var(--b2);border-radius:6px;
  padding:7px 10px;font-size:12px;color:var(--t1);font-family:'IBM Plex Sans',sans-serif;
  outline:none;transition:border-color .15s;
}
.p-inp:focus,.p-sel:focus{border-color:var(--acc)}
.p-inp::placeholder{color:var(--t4)}
.p-sel{cursor:pointer}.p-sel option{background:var(--s2)}

/* blank column row — exact grid from original site */
.blank-col-row{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:center;
  padding:6px 0;border-bottom:1px solid var(--b1);
}
.blank-col-row:last-child{border-bottom:none}
.blank-col-name{font-size:11px;color:var(--t2);font-weight:500}

/* error item — original/fixed pattern, exact from original site */
.error-item{
  display:grid;grid-template-columns:1fr 24px 1fr;gap:8px;align-items:center;
  padding:8px 0;border-bottom:1px solid var(--b1);
}
.error-item:last-child{border-bottom:none}
.error-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;display:inline-block;padding:2px 6px;border-radius:3px;margin-bottom:4px}
.error-left{background:var(--purple-bg);color:var(--purple);border:1px solid #3d1566}
.error-right{background:var(--green-bg);color:var(--green);border:1px solid #1a4a2e}
.error-arrow{font-size:11px;color:var(--t4);text-align:center}
.error-orig{font-size:11px;color:var(--t2);font-family:var(--mono)}
.error-col{font-size:9px;color:var(--t4)}

.replace-all-row{display:flex;gap:8px;align-items:center;padding:8px 0;border-top:1px dashed var(--b1);margin-bottom:8px}
.replace-all-label{font-size:10px;color:var(--t4);white-space:nowrap;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin .8s linear infinite;display:inline-block}

/* toast */
#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);padding:8px 18px;border-radius:8px;font-size:12px;font-weight:600;display:none;z-index:9999;white-space:nowrap;background:var(--green-bg);border:1px solid var(--green);color:var(--green)}
#toast.err{background:var(--red-bg);border-color:var(--red);color:var(--red)}
</style>
</head>
<body>

<!-- ══════════ HOME ══════════ -->
<div class="screen active" id="home">
  <div class="panel-body" id="home-body">
    <div class="home-header">
      <h1>MX Sheet Toolkit</h1>
      <p>Select cells in your sheet, then pick a feature.</p>
    </div>
    <div class="sel-box">
      <div class="sel-label">Current Selection</div>
      <div class="sel-addr" id="sel-addr">—</div>
      <div class="sel-count" id="sel-count">No selection yet</div>
      <button id="refresh-btn"><i class="ti ti-refresh"></i>Refresh selection</button>
    </div>
    <div class="feature-list">
      <button class="feature-btn" data-feature="clean"><i class="ti ti-sparkles"></i><div class="ft-text"><span class="ft-title">Clean a sheet</span><span class="ft-desc">Remove blanks, duplicates, fix formatting</span></div></button>
      <button class="feature-btn" data-feature="search-row"><i class="ti ti-list-search"></i><div class="ft-text"><span class="ft-title">Search for a row</span><span class="ft-desc">Find rows matching a value or condition</span></div></button>
      <button class="feature-btn" data-feature="bulk"><i class="ti ti-stack-2"></i><div class="ft-text"><span class="ft-title">Bulk manipulation</span><span class="ft-desc">Apply changes across many rows at once</span></div></button>
      <button class="feature-btn" data-feature="edit-column"><i class="ti ti-edit"></i><div class="ft-text"><span class="ft-title">Edit column</span><span class="ft-desc">Transform or update a whole column</span></div></button>
      <button class="feature-btn" data-feature="compare"><i class="ti ti-layers-difference"></i><div class="ft-text"><span class="ft-title">Compare sheets</span><span class="ft-desc">Diff two sheets or ranges</span></div></button>
      <button class="feature-btn" data-feature="add-sheet"><i class="ti ti-file-plus"></i><div class="ft-text"><span class="ft-title">Add a sheet</span><span class="ft-desc">Create a new sheet in this workbook</span></div></button>
      <button class="feature-btn" data-feature="search-sheet"><i class="ti ti-folder-search"></i><div class="ft-text"><span class="ft-title">Search for a sheet</span><span class="ft-desc">Find and jump to a sheet by name</span></div></button>
    </div>
  </div>
</div>

<!-- ══════════ STEP 1 — COLUMN TYPES ══════════ -->
<div class="screen" id="step1">
  <div class="panel-header">
    <button class="back-btn" onclick="goHome()"><i class="ti ti-arrow-left"></i></button>
    <div>
      <div class="panel-title">Clean a sheet</div>
      <div class="panel-sub">Step 1 of 2 — Confirm column types</div>
    </div>
  </div>
  <div class="panel-body" id="col-type-list"></div>
  <div class="panel-footer">
    <button class="primary-btn" onclick="goStep2()">Next — Scan for issues</button>
  </div>
</div>

<!-- ══════════ STEP 2 — ISSUES ══════════ -->
<div class="screen" id="step2">
  <div class="panel-header">
    <button class="back-btn" onclick="goStep1()"><i class="ti ti-arrow-left"></i></button>
    <div>
      <div class="panel-title">Clean a sheet</div>
      <div class="panel-sub" id="issues-sub">Step 2 of 2 — Review issues</div>
    </div>
  </div>
  <div class="panel-body" id="issues-body"></div>
  <div class="panel-footer">
    <button class="primary-btn" id="apply-btn" disabled onclick="applyClean()">Apply &amp; create cleaned sheet</button>
    <div class="btn-note">A new sheet is created with fixes applied. Your original stays untouched.</div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ════ STATE ════ */
var sel       = null;
var colTypes  = [];
var issues    = null;
var fmtColKeys = [];   // kept in module scope so add-col can update

/* ════ OFFICE READY ════ */
Office.onReady(function() {
  document.getElementById('refresh-btn').addEventListener('click', readSel);
  document.querySelectorAll('.feature-btn').forEach(function(b) {
    b.addEventListener('click', function(){ handleFeature(b.dataset.feature); });
  });
  readSel();
});

/* ════ SELECTION ════ */
function readSel() {
  Excel.run(function(ctx) {
    var r = ctx.workbook.getSelectedRange();
    r.load(['address','values','text','rowCount','columnCount']);
    return ctx.sync().then(function() {
      sel = { address: r.address, values: r.values, text: r.text, rowCount: r.rowCount, columnCount: r.columnCount };
      document.getElementById('sel-addr').textContent = r.address;
      document.getElementById('sel-count').textContent = r.rowCount + ' row(s) × ' + r.columnCount + ' col(s)';
    });
  }).catch(function(e) {
    document.getElementById('sel-addr').textContent = 'Error';
    document.getElementById('sel-count').textContent = e.message;
  });
}

/* ════ ROUTING ════ */
function show(id) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById(id).classList.add('active');
}
function goHome()  { show('home'); readSel(); }
function goStep1() { show('step1'); }
function handleFeature(f) {
  if (f === 'clean') openClean();
  else showToast('"' + f + '" — coming soon!', false);
}

/* ════ STEP 1 ════ */
function openClean() {
  if (!sel || sel.rowCount < 2) { showToast('Select data with at least a header + 1 data row.', true); return; }
  /* Merge .text over .values for any cell where the raw value is a number but
     the displayed text looks like a date — this replaces serial numbers with
     the string Excel already shows, exactly like the website sees it. */
  if (sel.text) {
    sel.values = sel.values.map(function(row, ri) {
      return row.map(function(v, ci) {
        var t = sel.text[ri] && sel.text[ri][ci] != null ? String(sel.text[ri][ci]) : '';
        /* Excel serial date: raw value is a number, displayed text is M/D/YYYY */
        if (typeof v === 'number' && /^\d{1,2}\/\d{1,2}\/\d{4}$/.test(t)) {
          /* Parse as M/D/YYYY (Excel default locale) → store as YYYY/MM/DD canonical */
          var p = t.split('/');
          var mo = String(p[0]).padStart(2,'0');
          var dy = String(p[1]).padStart(2,'0');
          var yr = p[2];
          return yr + '/' + mo + '/' + dy;
        }
        return v;
      });
    });
  }
  var headers = sel.values[0];
  var sample  = sel.values[1] || [];
  colTypes = headers.map(function(h, i){ return detectType(h, sample[i]); });

  var list = document.getElementById('col-type-list');
  list.innerHTML = '<div class="step-label" style="margin-bottom:4px">Confirm column types</div>';

  headers.forEach(function(h, i) {
    var row = document.createElement('div');
    row.className = 'col-type-row';
    var sampleText = (sample[i] !== undefined && sample[i] !== '') ? sample[i] : '(empty)';
    row.innerHTML =
      '<div class="tdot dot-' + colTypes[i] + '" id="tdot-' + i + '"></div>' +
      '<div style="flex:1;min-width:0">' +
        '<div class="col-name">' + (h || 'Col ' + (i+1)) + '</div>' +
        '<div class="col-sample">' + sampleText + '</div>' +
      '</div>' +
      '<select class="type-select" data-col="' + i + '">' +
        '<option value="text"'   + (colTypes[i]==='text'  ?' selected':'') + '>Text</option>' +
        '<option value="number"' + (colTypes[i]==='number'?' selected':'') + '>Number</option>' +
        '<option value="email"'  + (colTypes[i]==='email' ?' selected':'') + '>Email</option>' +
        '<option value="date"'   + (colTypes[i]==='date'  ?' selected':'') + '>Date</option>' +
      '</select>';
    row.querySelector('select').addEventListener('change', function(e){ updateType(i, e.target.value); });
    list.appendChild(row);
  });

  show('step1');
}

function detectType(h, v) {
  var hl = (h || '').toString().toLowerCase();
  if (hl.includes('email') || hl.includes('mail')) return 'email';
  if (hl.includes('date') || hl.includes('dob') || hl.includes('birth') || hl.includes('time')) return 'date';
  if (hl.includes('id') || hl.includes('amount') || hl.includes('price') || hl.includes('qty') || hl.includes('num') || hl.includes('age') || hl.includes('phone')) return 'number';
  if (typeof v === 'number') return 'number';
  if (typeof v === 'string' && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim())) return 'email';
  return 'text';
}

function updateType(colIdx, val) {
  colTypes[colIdx] = val;
  var dot = document.getElementById('tdot-' + colIdx);
  if (dot) dot.className = 'tdot dot-' + val;
}

/* ════ STEP 2 ════ */
function goStep2() {
  show('step2');
  var body = document.getElementById('issues-body');
  body.innerHTML = '<div style="display:flex;align-items:center;gap:8px;padding:14px;font-size:12px;color:var(--t3)"><i class="ti ti-loader-2 spin" style="font-size:16px"></i> Scanning your data…</div>';
  document.getElementById('apply-btn').disabled = true;

  setTimeout(function() {
    analyseData();
    renderIssues();
    document.getElementById('apply-btn').disabled = false;
  }, 350);
}

function analyseData() {
  var headers  = sel.values[0];
  var dataRows = sel.values.slice(1);

  /* blanks — per column */
  var blankCols = {};
  headers.forEach(function(h, j) {
    var empties = [];
    dataRows.forEach(function(row, i) {
      var v = row[j];
      if (v === null || v === undefined || v.toString().trim() === '') empties.push(i + 2);
    });
    if (empties.length) blankCols[j] = { header: h || ('Col ' + (j+1)), type: colTypes[j], count: empties.length };
  });

  /* duplicates */
  var seen = {}, dupes = [];
  dataRows.forEach(function(row, i) {
    var key = JSON.stringify(row);
    if (seen[key] !== undefined) {
      dupes.push({ rowIndex: i+2, preview: row.filter(function(c){ return c !== '' && c !== null && c !== undefined; }).slice(0,4).join(' · '), firstAt: seen[key]+2 });
    } else { seen[key] = i; }
  });

  /* formatting — detect real inconsistencies per column type */
  var fmtCols = {};
  headers.forEach(function(h, j) {
    var type = colTypes[j];
    var colVals = dataRows.map(function(row){ return row[j]; }).filter(function(v){ return v !== '' && v !== null && v !== undefined; });
    if (!colVals.length) return;

    if (type === 'text' || type === 'email') {
      var patterns = {};
      colVals.forEach(function(v){
        var p = getCasingPattern(String(v));
        patterns[p] = (patterns[p] || 0) + 1;
      });
      if (Object.keys(patterns).length > 1) {
        fmtCols[j] = { header: h || ('Col '+(j+1)), type: type, issueType: 'casing', issueCount: colVals.length, patterns: patterns };
      }
    } else if (type === 'date') {
      var dformats = {};
      var parseable = 0;
      colVals.forEach(function(v){
        var f = detectDateFormat(String(v));
        dformats[f] = (dformats[f] || 0) + 1;
        if (f !== 'unknown') parseable++;
      });
      /* Always offer date reformatting if any value is parseable */
      if (parseable > 0) {
        fmtCols[j] = { header: h || ('Col '+(j+1)), type: type, issueType: 'date', issueCount: colVals.length, formats: dformats };
      }
    } else if (type === 'number') {
      var decimalCounts = {};
      colVals.forEach(function(v){
        var s = String(v).replace(/[^0-9.\-]/g, '');
        var parts = s.split('.');
        var dp = parts.length > 1 ? parts[1].length : 0;
        decimalCounts[dp] = (decimalCounts[dp] || 0) + 1;
      });
      /* hasNonNumeric: any character that isn't a digit, dot, minus, comma, or space */
      var hasNonNumeric = colVals.some(function(v){ return /[^\d.\-,\s]/.test(String(v)); });
      /* Always offer number formatting */
      fmtCols[j] = { header: h || ('Col '+(j+1)), type: type, issueType: 'number', issueCount: colVals.length, decimalCounts: decimalCounts, hasNonNumeric: hasNonNumeric };
    }
  });

  /* bad emails */
  var emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  var badEmails = [];
  headers.forEach(function(h, j) {
    if (colTypes[j] !== 'email') return;
    dataRows.forEach(function(row, i) {
      var v = row[j];
      if (v && typeof v === 'string' && !emailRe.test(v.trim())) {
        badEmails.push({ rowIndex: i+2, colIdx: j, col: h, value: v });
      }
    });
  });

  issues = { blankCols: blankCols, dupes: dupes, fmtCols: fmtCols, badEmails: badEmails };
  fmtColKeys = Object.keys(fmtCols);
  var total = Object.keys(blankCols).length + dupes.length + fmtColKeys.length + badEmails.length;
  document.getElementById('issues-sub').textContent = 'Step 2 of 2 — ' + total + ' issue' + (total!==1?'s':'') + ' found';
}

/* ── casing pattern detection (matches original site logic) ── */
function getCasingPattern(text) {
  if (!text) return 'unknown';
  var t = text.trim();
  if (!t) return 'unknown';
  if (t === t.toUpperCase() && /[A-Z]/.test(t)) return 'upper';
  if (t === t.toLowerCase()) return 'lower';
  var words = t.split(/\s+/).filter(function(w){ return w.length > 0; });
  var isTitle = words.every(function(w){
    if (w.length === 0) return true;
    if (w === w.toUpperCase() && w.length <= 3) return true;
    return w[0] === w[0].toUpperCase() && w.slice(1) === w.slice(1).toLowerCase();
  });
  if (isTitle) return 'title';
  return 'mixed';
}

function applyCasing(text, pattern) {
  if (!text) return text;
  if (pattern === 'upper') return text.toUpperCase();
  if (pattern === 'lower') return text.toLowerCase();
  if (pattern === 'title') return text.toLowerCase().replace(/(?:^|\s)\S/g, function(c){ return c.toUpperCase(); });
  return text;
}

       reads the correct values even if the user never touches a dropdown. */
    col.chosenDecimals  = col.chosenDecimals  || 'keep';
    col.chosenNumtext   = col.chosenNumtext   || 'keep';
    col.chosenThousands = col.chosenThousands || 'none';
    controlsHtml =

            ' onchange="issues.fmtCols[' + j + '].chosenDecimals=this.value">' +
            '<option value="keep" selected>Keep as is</option>' +
            '<option value="0">0</option><option value="1">1</option>' +
            '<option value="2">2</option><option value="3">3</option>' +
          '</select>' +
        '</div>' +
        '<div style="display:flex;gap:6px;align-items:center">' +
          '<span style="font-size:10px;color:var(--t3);flex-shrink:0;width:62px">Non-num:</span>' +
          '<select class="p-sel fmt-control" data-col="' + j + '" data-mode="numtext" style="font-size:11px;flex:1;padding:4px 6px"' +
            ' onchange="issues.fmtCols[' + j + '].chosenNumtext=this.value">' +
            '<option value="keep" selected>Keep</option>' +
            '<option value="remove">Remove</option>' +
          '</select>' +
        '</div>' +
        '<div style="display:flex;gap:6px;align-items:center">' +
          '<span style="font-size:10px;color:var(--t3);flex-shrink:0;width:62px">Thousands:</span>' +
          '<select class="p-sel fmt-control" data-col="' + j + '" data-mode="thousands" style="font-size:11px;flex:1;padding:4px 6px"' +
            ' onchange="issues.fmtCols[' + j + '].chosenThousands=this.value">' +
            '<option value="none" selected>None</option>' +
            '<option value="comma">1,000</option>' +
            '<option value="space">1 000</option>' +
            '<option value="period">1.000</option>' +
          '</select>' +
        '</div>' +
      '</div>';
  }

  row.innerHTML =
    '<div class="tdot dot-' + col.type + '"></div>' +
    '<div style="flex:1;min-width:0">' +
      '<div class="fmt-col-name">' + col.header + '</div>' +
      '<div class="fmt-col-type">' + col.type + ' · ' + (col.manual ? 'manually added' : (col.issueCount + ' value' + (col.issueCount!==1?'s':'') + ' affected')) + '</div>' +
    '</div>' +
    controlsHtml;
  return row;
}

/* ── tryParseDate: string date → canonical YYYY/MM/DD ── */
/* Mirrors the website logic exactly — works on text strings only */
function tryParseDate(v) {
  if (!v) return v;
  var s = String(v).trim();
  if (!s) return v;
  /* YYYY-MM-DD or YYYY/MM/DD (1- or 2-digit month/day) */
  var iso = s.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})$/);
  if (iso) return iso[1]+'/'+String(iso[2]).padStart(2,'0')+'/'+String(iso[3]).padStart(2,'0');
  /* D/M/YYYY or DD/MM/YYYY */
  var dmy = s.match(/^(\d{1,2})[-\/](\d{1,2})[-\/](\d{4})$/);
  if (dmy) return dmy[3]+'/'+String(dmy[2]).padStart(2,'0')+'/'+String(dmy[1]).padStart(2,'0');
  /* Compact DDMMYYYY */
  var num = s.match(/^(\d{2})(\d{2})(\d{4})$/);
  if (num) return num[3]+'/'+num[2]+'/'+num[1];
  /* Fallback — native Date (handles 'Jan 5 2026', ISO timestamps, etc.) */
  var d = new Date(s);
  if (!isNaN(d.getTime())) return d.getFullYear()+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+String(d.getDate()).padStart(2,'0');
  return v;
}

function detectDateFormat(v) {
  if (v === null || v === undefined || v === '') return 'unknown';
  var s = String(v).trim();
  if (/^\d{4}[-\/]\d{1,2}[-\/]\d{1,2}$/.test(s)) return 'YYYY/MM/DD';
  if (/^\d{1,2}[-\/]\d{1,2}[-\/]\d{4}$/.test(s)) return parseInt(s.split(/[-\/]/)[0])>12 ? 'DD/MM/YYYY' : 'ambiguous';
  var parsed = tryParseDate(s);
  if (parsed !== s) return 'other';
  return 'unknown';
}

function normalizeDate(v, targetFormat) {
  if (v === null || v === undefined || v === '') return v;
  var canonical = tryParseDate(v);
  /* canonical may equal v if already YYYY/MM/DD — that's fine, still reformat */
  var m = String(canonical).match(/^(\d{4})\/(\d{2})\/(\d{2})$/);
  if (!m) return v; /* truly unparseable — leave unchanged */
  var yr=m[1], mo=m[2], dy=m[3];
  /* For YYYY-first formats, prefix with a single quote so Excel stores them as
     text and does NOT re-parse/reformat them according to the locale date format. */
  if (targetFormat==='YYYY/MM/DD') return "'" + yr+'/'+mo+'/'+dy;
  if (targetFormat==='YYYY-MM-DD') return "'" + yr+'-'+mo+'-'+dy;
  if (targetFormat==='DD/MM/YYYY') return dy+'/'+mo+'/'+yr;
  if (targetFormat==='MM/DD/YYYY') return mo+'/'+dy+'/'+yr;
  return "'" + yr+'/'+mo+'/'+dy;
}

/* ════ RENDER ISSUES ════ */
function renderIssues() {
  var body = document.getElementById('issues-body');
  body.innerHTML = '';
  var bc = issues.blankCols, dupes = issues.dupes, fc = issues.fmtCols, be = issues.badEmails;

  /* ── Blank cells — exact pattern: "Name (x6)" + input, 2-col grid ── */
  var blankTotal = Object.values(bc).reduce(function(s,c){ return s+c.count; }, 0);
  var blanksAcc = makeAcc('blanks', 'ti-circle-minus', 'var(--red)', 'Blanks', blankTotal, 'b-red');
  var blanksBody = blanksAcc.querySelector('.acc-body');
  var blanksInner = document.createElement('div');
  blanksInner.style.padding = '12px 14px';
  if (!blankTotal) {
    blanksInner.innerHTML = '<div style="font-size:11px;color:var(--t4);padding:8px 0">No blank cells found</div>';
  } else {
    Object.entries(bc).forEach(function(entry) {
      var j = entry[0], col = entry[1];
      var def = defaultVal(col.type);
      var row = document.createElement('div');
      row.className = 'blank-col-row';
      row.innerHTML =
        '<div class="blank-col-name">' + col.header + ' <span style="color:var(--t4)">(x' + col.count + ')</span></div>' +
        '<input class="p-inp" style="font-size:11px" value="' + def + '" data-col="' + j + '">';
      blanksInner.appendChild(row);
    });
  }
  blanksBody.appendChild(blanksInner);
  body.appendChild(blanksAcc);

  /* ── Duplicate rows ── */
  var dupesAcc = makeAcc('dupes', 'ti-copy', 'var(--amber)', 'Duplicate rows', dupes.length, 'b-amber');
  var dupesBody = dupesAcc.querySelector('.acc-body');
  if (!dupes.length) {
    dupesBody.innerHTML = '<div class="acc-empty">No duplicate rows found</div>';
  } else {
    var selAll = document.createElement('label');
    selAll.className = 'sel-all-row';
    selAll.innerHTML = '<input type="checkbox" id="dupe-all" checked> Select all (' + dupes.length + ')';
    selAll.querySelector('input').addEventListener('change', function(e) {
      dupesBody.querySelectorAll('.dupe-cb').forEach(function(cb){ cb.checked = e.target.checked; });
    });
    dupesBody.appendChild(selAll);
    dupes.forEach(function(d, idx) {
      var row = document.createElement('div');
      row.className = 'dupe-row';
      row.innerHTML =
        '<input type="checkbox" class="dupe-cb" data-idx="' + idx + '" checked>' +
        '<span class="dupe-rnum">Row ' + d.rowIndex + '</span>' +
        '<span class="dupe-preview">' + d.preview + '</span>' +
        '<span class="dupe-tag">≡ row ' + d.firstAt + '</span>';
      dupesBody.appendChild(row);
    });
  }
  body.appendChild(dupesAcc);

  /* ── Formatting — per-column rows with type-specific controls ── */
  var fmtAcc = makeAcc('fmt', 'ti-text-spellcheck', 'var(--acc)', 'Formatting Inconsistencies', fmtColKeys.length, 'b-blue');
  var fmtBody = fmtAcc.querySelector('.acc-body');
  var fmtInner = document.createElement('div');
  fmtInner.style.padding = '4px 0';

  if (!fmtColKeys.length) {
    fmtInner.innerHTML = '<div style="font-size:11px;color:var(--t4);padding:12px 14px">No formatting inconsistencies found</div>';
  } else {
    fmtColKeys.forEach(function(j) { fmtInner.appendChild(buildFmtRow(j, fc[j])); });
  }

  /* manual add-column control — always shown, in case the scan missed a column */
  var fmtAddWrap = document.createElement('div');
  fmtAddWrap.style.padding = '10px 14px';
  fmtAddWrap.style.borderTop = fmtColKeys.length ? '1px dashed var(--b1)' : 'none';
  fmtAddWrap.innerHTML =
    '<div style="display:flex;gap:8px;align-items:center">' +
      '<select class="p-sel" id="fmt-add-select" style="font-size:11px;flex:1"></select>' +
      '<button class="add-col-btn" id="fmt-add-btn" style="white-space:nowrap;border:1px solid var(--b1);border-radius:6px;padding:6px 10px"><i class="ti ti-plus"></i> Add column</button>' +
    '</div>';
  fmtInner.appendChild(fmtAddWrap);
  fmtBody.appendChild(fmtInner);
  body.appendChild(fmtAcc);

  /* populate the add-column dropdown with columns not already listed */
  refreshFmtAddSelect();
  document.getElementById('fmt-add-btn').addEventListener('click', function() {
    var selEl = document.getElementById('fmt-add-select');
    var j = selEl.value;
    if (j === '' || issues.fmtCols[j]) return;
    var headers = sel.values[0];
    var type = colTypes[j];
    var col = { header: headers[j] || ('Col '+(+j+1)), type: type, issueType: type==='date'?'date':(type==='number'?'number':'casing'), issueCount: 0, manual: true };
    issues.fmtCols[j] = col;
    fmtColKeys.push(j);
    var newRow = buildFmtRow(j, col);
    fmtInner.insertBefore(newRow, fmtAddWrap);
    fmtAddWrap.style.borderTop = '1px dashed var(--b1)';
    refreshFmtAddSelect();
    updateBadge('fmt', fmtColKeys.length);
  });


  /* ── Incorrect emails — exact pattern: replace-all row + original->fixed error-items ── */
  var emailAcc = makeAcc('emails', 'ti-mail-x', 'var(--amber)', 'Incorrect Emails', be.length, 'b-amber');
  var emailBody = emailAcc.querySelector('.acc-body');
  var emailInner = document.createElement('div');
  emailInner.style.padding = '12px 14px';

  if (!be.length) {
    emailInner.innerHTML = '<div style="font-size:11px;color:var(--t4);padding:8px 0">No invalid emails found</div>';
  } else {
    var replaceRow = document.createElement('div');
    replaceRow.className = 'replace-all-row';
    replaceRow.innerHTML =
      '<span class="replace-all-label">Replace all invalid with:</span>' +
      '<input class="p-inp" id="email-replace-all" value="x@gmail.com" style="flex:1;font-size:11px">' +
      '<button class="add-col-btn" id="email-replace-btn" style="white-space:nowrap">Apply</button>';
    emailInner.appendChild(replaceRow);

    be.forEach(function(e, idx) {
      var row = document.createElement('div');
      row.className = 'error-item';
      row.innerHTML =
        '<div>' +
          '<div class="error-label error-left">Invalid</div>' +
          '<div class="error-orig">' + e.value + '</div>' +
          '<div class="error-col">in column "' + e.col + '"</div>' +
        '</div>' +
        '<span class="error-arrow"><i class="ti ti-arrow-right"></i></span>' +
        '<div>' +
          '<div class="error-label error-right">Fixed</div>' +
          '<input class="p-inp email-input" style="font-size:11px" value="x@gmail.com" data-idx="' + idx + '" placeholder="Enter valid email">' +
        '</div>';
      emailInner.appendChild(row);
    });

    replaceRow.querySelector('#email-replace-btn').addEventListener('click', function() {
      var val = document.getElementById('email-replace-all').value || 'x@gmail.com';
      emailInner.querySelectorAll('.email-input').forEach(function(inp){ inp.value = val; });
      showToast('Applied to all invalid emails', false);
    });
  }
  emailBody.appendChild(emailInner);
  body.appendChild(emailAcc);
}

/* ════ DEFAULTS ════ */
function defaultVal(type) {
  return { text:'N/A', number:'0', email:'x@gmail.com', date:'Unknown' }[type] || 'N/A';
}

/* ════ APPLY ════ */
function applyClean() {
  var btn = document.getElementById('apply-btn');
  btn.disabled = true; btn.textContent = 'Creating sheet…';

  var headers  = sel.values[0];
  var dataRows = sel.values.slice(1).map(function(r){ return r.slice(); });

  /* 1. fill blanks */
  Object.entries(issues.blankCols).forEach(function(entry) {
    var j = entry[0];
    var inp = document.querySelector('.blank-col-row .p-inp[data-col="' + j + '"]');
    var fillVal = inp ? inp.value : defaultVal(entry[1].type);
    dataRows.forEach(function(row) {
      if (row[j] === null || row[j] === undefined || row[j].toString().trim() === '') row[j] = fillVal;
    });
  });

  /* 2. remove checked dupes */
  var dupeIdxToRemove = new Set();
  document.querySelectorAll('.dupe-cb:checked').forEach(function(cb) {
    dupeIdxToRemove.add(issues.dupes[+cb.dataset.idx].rowIndex - 2);
  });
  dataRows = dataRows.filter(function(_, i){ return !dupeIdxToRemove.has(i); });

  /* 3. formatting — apply per-column control based on issue type */
  Object.keys(issues.fmtCols).forEach(function(j) {
    var col = issues.fmtCols[j];
    var jNum = +j;

    if (col.issueType === 'casing') {
      var mode = col.chosenCasing || 'title';
      if (mode === 'keep') return;
      dataRows.forEach(function(row) {
        var v = row[jNum];
        if (typeof v === 'string' && v.trim() !== '') row[jNum] = applyCasing(v, mode);
      });
    } else if (col.issueType === 'date') {
      /* Read from data object — set by onchange, not fragile querySelector */
      var targetFmt = col.chosenFmt || 'YYYY/MM/DD';
      dataRows.forEach(function(row) {
        var v = row[jNum];
        if (v !== '' && v !== null && v !== undefined) row[jNum] = normalizeDate(v, targetFmt);
      });
    } else if (col.issueType === 'number') {
      /* Read directly from the DOM selects as the source of truth —
         this guarantees the correct value even if onchange misfired. */
      var decSel  = document.querySelector('.fmt-control[data-col="' + jNum + '"][data-mode="decimals"]');
      var txtSel  = document.querySelector('.fmt-control[data-col="' + jNum + '"][data-mode="numtext"]');
      var thouSel = document.querySelector('.fmt-control[data-col="' + jNum + '"][data-mode="thousands"]');
      var decMode  = decSel  ? decSel.value  : (col.chosenDecimals  || 'keep');
      var txtMode  = txtSel  ? txtSel.value  : (col.chosenNumtext   || 'keep');
      var thouMode = thouSel ? thouSel.value : (col.chosenThousands || 'none');
      /* skip entirely if nothing changes */
      if (decMode === 'keep' && txtMode === 'keep' && thouMode === 'none') return;

      /* ── helper: extract prefix, core numeric string, and suffix from a raw value ──
         Examples:
           "R1500"      → prefix="R", core="1500",   suffix=""
           "$ 1, 200"   → prefix="$ ", core="1200",  suffix=""   (spaces/commas stripped from core)
           "ME 100"     → prefix="ME ", core="100",  suffix=""
           "1,200.50"   → prefix="",   core="1200.50", suffix=""
           "-$1,200"    → prefix="-$", core="1200",  suffix=""
      */
      function splitNumericParts(s) {
        s = String(s).trim();
        /* Find the first digit */
        var firstDigit = s.search(/\d/);
        if (firstDigit < 0) return null; /* no digits at all */
        var prefix = s.slice(0, firstDigit);
        var sign = prefix.indexOf('-') >= 0 ? '-' : '';

        /* Find the last digit in the string */
        var lastDigit = -1;
        for (var i = s.length - 1; i >= 0; i--) {
          if (/\d/.test(s[i])) { lastDigit = i; break; }
        }

        /* Numeric body = everything from first digit to last digit (inclusive).
           This correctly captures "2 000", "1,200.50", "1 200.50" etc. */
        var numBody = s.slice(firstDigit, lastDigit + 1);
        var suffix  = s.slice(lastDigit + 1);

        /* Strip any non-digit non-dot chars from the body to get a parseable float.
           This handles comma-thousands ("1,200"), space-thousands ("2 000"), etc. */
        var cleanCore = numBody.replace(/[^0-9.]/g, '');
        /* Guard against multiple dots (e.g. period-thousands "1.200.50" → keep only last dot) */
        var dotCount = (cleanCore.match(/\./g) || []).length;
        if (dotCount > 1) {
          /* Treat all but the last dot as thousands separators — remove them */
          var lastDot = cleanCore.lastIndexOf('.');
          cleanCore = cleanCore.slice(0, lastDot).replace(/\./g, '') + cleanCore.slice(lastDot);
        }

        return { prefix: prefix, sign: sign, core: cleanCore, suffix: suffix };
      }

      /* ── pre-scan: find max dp across column so 'keep' keeps uniform decimals ── */
      var resolvedDp;
      if (decMode === 'keep') {
        var maxDp = 0;
        dataRows.forEach(function(row) {
          var v = row[jNum];
          if (v === '' || v === null || v === undefined) return;
          var parts = splitNumericParts(String(v));
          if (!parts) return;
          if (parts.core.indexOf('.') >= 0) maxDp = Math.max(maxDp, parts.core.split('.')[1].length);
        });
        resolvedDp = maxDp;
      } else {
        resolvedDp = +decMode;
      }

      dataRows.forEach(function(row) {
        var v = row[jNum];
        if (v === '' || v === null || v === undefined) return;
        var s = String(v).trim();

        var parts = splitNumericParts(s);
        if (!parts) return; /* no digits at all — leave unchanged */

        var num = parseFloat(parts.sign + parts.core);
        if (isNaN(num)) return; /* unparseable — leave unchanged */

        /* ── decimal places ── */
        var formatted = Math.abs(num).toFixed(resolvedDp);

        /* ── thousands separator ── */
        var numStr;
        if (thouMode !== 'none') {
          var fp = formatted.split('.');
          var intPart = fp[0];
          var decPart = fp.length > 1 ? fp[1] : null;
          var sepChar = thouMode === 'comma' ? ',' : (thouMode === 'space' ? ' ' : '.');
          intPart = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, sepChar);
          /* period-thousands: use comma as decimal separator to avoid ambiguity */
          var decSepChar = thouMode === 'period' ? ',' : '.';
          numStr = (decPart !== null) ? intPart + decSepChar + decPart : intPart;
        } else {
          /* no thousands sep — just the number digits */
          numStr = formatted;
        }

        /* ── sign ── */
        if (parts.sign === '-') numStr = '-' + numStr;

        /* ── re-attach prefix / suffix based on txtMode ── */
        if (txtMode === 'keep') {
          /* Keep the original prefix and suffix, replace only the numeric body */
          row[jNum] = parts.prefix.replace('-','') + numStr + parts.suffix;
          /* Note: sign is already embedded in numStr; prefix may contain '-' so strip it there */
        } else {
          /* remove — output is the pure number string (or actual number when no thousands sep) */
          if (thouMode === 'none') {
            /* store as true number so Excel treats it numerically */
            row[jNum] = parseFloat((parts.sign || '') + formatted);
          } else {
            row[jNum] = numStr;
          }
        }
      });
    }
  });


  /* 4. fix emails */
  document.querySelectorAll('.email-input').forEach(function(inp) {
    var idx = +inp.dataset.idx;
    var e = issues.badEmails[idx];
    var dataIdx = e.rowIndex - 2;
    if (dataRows[dataIdx] !== undefined) dataRows[dataIdx][e.colIdx] = inp.value;
  });

  var cleanedData = [headers].concat(dataRows);

  Excel.run(function(ctx) {
    var sheets = ctx.workbook.worksheets;
    sheets.load('items/name');
    return ctx.sync().then(function() {
      var existing = sheets.items.map(function(s){ return s.name; });
      var name = 'Cleaned Data', n = 1;
      while (existing.includes(name)) name = 'Cleaned Data ' + (n++);
      var ns = sheets.add(name);
      ns.getRangeByIndexes(0, 0, cleanedData.length, cleanedData[0].length).values = cleanedData;
      ns.getRangeByIndexes(0, 0, 1, cleanedData[0].length).format.font.bold = true;
      ns.activate();
      return ctx.sync();
    });
  }).then(function() {
    showToast('✓ Cleaned sheet created!', false);
    goHome();
  }).catch(function(e) {
    showToast(e.message, true);
  }).finally(function() {
    btn.disabled = false; btn.textContent = 'Apply & create cleaned sheet';
  });
}

/* ════ TOAST ════ */
function showToast(msg, err) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = err ? 'err' : '';
  t.style.display = 'block';
  clearTimeout(t._timer);
  t._timer = setTimeout(function(){ t.style.display = 'none'; }, 3500);
}
</script>
</body>
</html>
